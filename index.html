<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest Clone</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

h1{
    text-align:center;
    padding:20px;
}

.gallery{
    column-count: 4;
    column-gap: 15px;
    padding:15px;
}

.gallery img{
    width:100%;
    margin-bottom:15px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
}

.gallery img:hover{
    transform: scale(1.05);
    opacity:0.9;
}

@media (max-width:1000px){
    .gallery{ column-count:3; }
}

@media (max-width:700px){
    .gallery{ column-count:2; }
}

@media (max-width:500px){
    .gallery{ column-count:1; }
}
</style>
</head>

<body>

<h1>📌 Website 8A</h1>

<div class="gallery">
    <img src="anh1.jpg">
    <img src="anh2.jpg">
    <img src="anh3.jpg">
    <img src="anh4.jpg">
    <img src="anh5.jpg">
    <img src="anh6.jpg">
</div>

</body>
</html>
